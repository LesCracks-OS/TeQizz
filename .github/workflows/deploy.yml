# =============================================================================
# TeQizz — CI/CD Pipeline
# =============================================================================
#
# Déclencheurs :
#   • push main        → build + deploy prod (automatique)
#   • pull_request → main → build + CI (validation avant merge)
#   • workflow_dispatch → deploy manuel (choix du service)
#
# Required GitHub Secrets:
#   DOCKER_USERNAME   — Docker Hub username
#   DOCKER_PASSWORD   — Docker Hub access token
#   VPS_HOST          — IP du VPS
#   VPS_USER          — Utilisateur SSH (root)
#   VPS_SSH_KEY       — Clé privée SSH
# =============================================================================

name: CI/CD — TeQizz

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: "Service à rebuilder"
        required: false
        default: "all"
        type: choice
        options: [all, backend, frontend]

env:
  BACKEND_IMAGE:  brandoniscoding/backend-teqizz
  FRONTEND_IMAGE: brandoniscoding/frontend-teqizz
  DEPLOY_PATH:    /root/teqizz

jobs:
  # ---------------------------------------------------------------------------
  # Guard — aucune référence à des outils externes dans les commits
  # Équivalent d'un hook pre-receive côté serveur pour GitHub standard
  # ---------------------------------------------------------------------------
  guard:
    name: Guard commit integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan commit messages and authors
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
            RANGE="${BASE}..${HEAD}"
          else
            RANGE="${{ github.event.before }}..${{ github.sha }}"
            if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
              RANGE="${{ github.sha }}"
            fi
          fi

          LOG=$(git log --format="%s%n%b%n%an%n%ae" $RANGE 2>/dev/null || git log --format="%s%n%b%n%an%n%ae" -20)

          if echo "$LOG" | grep -qi "claude"; then
            echo "❌ Référence à Claude détectée dans les commits. Pipeline bloqué."
            exit 1
          fi
          echo "✅ Aucune référence interdite détectée."

  # ---------------------------------------------------------------------------
  # Detect which service changed
  # ---------------------------------------------------------------------------
  changes:
    name: Detect changes
    needs: guard
    runs-on: ubuntu-latest
    outputs:
      backend:  ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'
            frontend:
              - 'frontend/**'
              - 'docker-compose.prod.yml'
              - '.github/workflows/deploy.yml'

  # ---------------------------------------------------------------------------
  # Build backend — Spring Boot → JRE Alpine
  # ---------------------------------------------------------------------------
  build-backend:
    name: Build backend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.backend == 'true' ||
      github.event.inputs.service == 'backend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context:    ./backend
          target:     prod
          push:       ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

  # ---------------------------------------------------------------------------
  # Build frontend — Vite + Nginx
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build frontend image
    runs-on: ubuntu-latest
    needs: changes
    if: |
      needs.changes.outputs.frontend == 'true' ||
      github.event.inputs.service == 'frontend' ||
      github.event.inputs.service == 'all' ||
      github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context:    ./frontend
          push:       ${{ github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

  # ---------------------------------------------------------------------------
  # Deploy — SSH sur le VPS
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name != 'pull_request' &&
      always() &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled')
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.prod.yml
        uses: appleboy/scp-action@v0.1.7
        with:
          host:      ${{ secrets.VPS_HOST }}
          username:  ${{ secrets.VPS_USER }}
          key:       ${{ secrets.VPS_SSH_KEY }}
          source:    "docker-compose.prod.yml"
          target:    "${{ env.DEPLOY_PATH }}/"
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        with:
          host:            ${{ secrets.VPS_HOST }}
          username:        ${{ secrets.VPS_USER }}
          key:             ${{ secrets.VPS_SSH_KEY }}
          timeout:         60s
          command_timeout: 20m
          envs:            DOCKER_USERNAME,DOCKER_PASSWORD
          script: |
            set -euo pipefail
            cd ${{ env.DEPLOY_PATH }}

            # Source env vars so shell can use $DB_USERNAME / $DB_NAME in health checks
            set -a; source .env; set +a

            # Docker Hub login with fresh credentials from GitHub Secrets
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

            echo "══════════════════════════════════════════════════"
            echo "  TeQizz — Deployment"
            echo "  Date   : $(date '+%Y-%m-%d %H:%M:%S UTC')"
            echo "  Commit : ${{ github.sha }}"
            echo "══════════════════════════════════════════════════"

            # ── 1. Réseau Traefik ─────────────────────────────────
            echo ""
            echo "→ [1/3] Vérification réseau traefik-public..."
            docker network inspect traefik-public >/dev/null 2>&1 || \
              docker network create traefik-public

            # ── 2. Pull des images ────────────────────────────────
            echo ""
            echo "→ [2/3] Pull des images Docker..."
            docker pull ${{ env.BACKEND_IMAGE }}:latest
            docker pull ${{ env.FRONTEND_IMAGE }}:latest

            # ── 3. Démarrage PostgreSQL + MinIO + Backend ─────────
            echo ""
            echo "→ [3/3] Démarrage PostgreSQL + MinIO..."
            docker compose -f docker-compose.prod.yml up -d --no-recreate postgres minio

            echo "  Attente PostgreSQL..."
            timeout 60 sh -c \
              'until docker compose -f docker-compose.prod.yml exec -T postgres \
                pg_isready -U "$DB_USERNAME" -d "$DB_NAME" >/dev/null 2>&1; \
              do sleep 3; done'

            echo "  Attente MinIO..."
            timeout 60 sh -c \
              'until docker compose -f docker-compose.prod.yml exec -T minio \
                mc ready local >/dev/null 2>&1; \
              do sleep 3; done'

            echo "  Démarrage backend (Spring Boot — peut prendre ~60s)..."
            docker compose -f docker-compose.prod.yml up -d backend --remove-orphans

            echo "  Attente backend healthy (max 5 min)..."
            BACKEND_OK=0
            for i in $(seq 1 30); do
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' teqizz-backend 2>/dev/null || echo "unknown")
              if [ "$STATUS" = "healthy" ]; then
                echo "  Backend healthy (tentative $i)"
                BACKEND_OK=1
                break
              fi
              echo "  Tentative $i/30 — statut: $STATUS, retry dans 10s..."
              sleep 10
            done

            if [ "$BACKEND_OK" -eq 0 ]; then
              echo ""
              echo "══════ ERREUR : backend non healthy après 5 min ══════"
              docker logs --tail=100 teqizz-backend 2>&1 || true
              exit 1
            fi

            echo "  Déploiement frontend (force recreate — rafraîchit le DNS nginx vers le backend)..."
            docker compose -f docker-compose.prod.yml up -d frontend --remove-orphans --force-recreate

            # ── Cleanup ───────────────────────────────────────────
            echo ""
            echo "→ Nettoyage images inutilisées..."
            docker image prune -f --filter "until=24h" 2>/dev/null || true

            # ── Statut final ──────────────────────────────────────
            echo ""
            echo "→ Statut des services :"
            docker compose -f docker-compose.prod.yml ps

            echo ""
            echo "══════════════════════════════════════════════════"
            echo "  Déploiement terminé — $(date '+%H:%M:%S UTC')"
            echo "══════════════════════════════════════════════════"
